<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>頭痛チェック グラフビューア</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.container{max-width:960px;margin:0 auto;padding:12px}
h1{text-align:center;font-size:20px;margin:10px 0 6px;color:#4a6fa5}
.subtitle{text-align:center;font-size:12px;color:#888;margin-bottom:16px}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:16px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:10px;color:#4a6fa5;border-bottom:2px solid #e0e6ef;padding-bottom:6px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.btn-primary{background:#4a6fa5;color:#fff}
.btn-primary:hover{background:#3a5f95}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#a93226}
.btn-secondary{background:#eee;color:#333}
.btn-secondary:hover{background:#ddd}
.btn-sm{padding:6px 12px;font-size:12px}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.actions .spacer{flex:1 1 auto}
.patient-filter{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.patient-filter select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit}
.modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:rgba(0,0,0,.5)}
.modal.hidden{display:none}
.modal-card{background:#fff;border-radius:12px;padding:20px;max-width:90vw;width:440px;max-height:90vh;overflow:auto}
.modal-card h3{margin-bottom:10px;color:#4a6fa5}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast-success{background:#27ae60}
.toast-error{background:#c0392b}
.toast-warn{background:#d4ac0d}
table.data-table{width:100%;border-collapse:collapse;font-size:12px}
table.data-table th,table.data-table td{padding:6px 8px;border:1px solid #e0e0e0;text-align:center}
table.data-table th{background:#f0f4f8;font-weight:bold;color:#4a6fa5;position:sticky;top:0}
table.data-table tr:nth-child(even){background:#fafbfc}
table.data-table tr:hover{background:#eef2f7}
.table-wrap{max-height:300px;overflow:auto;border:1px solid #e0e0e0;border-radius:6px}
.chart-container{position:relative;width:100%;max-width:100%}
.chart-container canvas{width:100%!important}
.tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #e0e6ef;padding-bottom:0}
.tab{padding:8px 16px;cursor:pointer;border:none;background:transparent;font-size:13px;font-family:inherit;border-bottom:3px solid transparent;color:#888;transition:all .15s}
.tab.active{color:#4a6fa5;border-bottom-color:#4a6fa5;font-weight:bold}
.tab-panel{display:none}
.tab-panel.active{display:block}
.manual-input textarea{width:100%;min-height:120px;border:1px solid #ccc;border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;color:#fff}
.badge-severe{background:#c0392b}
.badge-high{background:#d35400}
.badge-moderate{background:#d4ac0d;color:#333}
.badge-mild{background:#27ae60}
.empty-state{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.empty-state .icon{font-size:48px;margin-bottom:10px}
.scan-methods{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.scan-methods .or-divider{text-align:center;color:#aaa;font-size:12px;position:relative}
.scan-methods .or-divider::before,.scan-methods .or-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#ddd}
.scan-methods .or-divider::before{left:0}
.scan-methods .or-divider::after{right:0}
.file-upload-area{border:2px dashed #ccc;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s}
.file-upload-area:hover{border-color:#4a6fa5}
.file-upload-area input{display:none}
.file-upload-area .icon{font-size:32px;margin-bottom:6px}
.file-upload-area .label{font-size:13px;color:#666}
#qr-reader{min-height:250px}
#qr-reader video{border-radius:8px}
.scanner-status{text-align:center;padding:10px;font-size:13px;color:#888}
@media(max-width:600px){
  .container{padding:8px}
  .card{padding:12px}
  .actions{flex-direction:column}
  .actions .spacer{display:none}
  .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>
<div class="container">
  <h1>&#x1F4CA; 頭痛チェック グラフビューア</h1>
  <p class="subtitle">Headache-Yes-No QRコードを読み取り、HIT-6 / MIBS-4 / MHD / MMD を可視化</p>

  <div class="card">
    <div class="actions">
      <button class="btn btn-primary" onclick="openScanner()">&#x1F4F7; QRコード読み取り</button>
      <button class="btn btn-secondary" onclick="openManualInput()">&#x1F4DD; 手動入力</button>
      <button class="btn btn-secondary" onclick="exportCsv()">&#x1F4E5; CSV出力</button>
      <span class="spacer"></span>
      <button class="btn btn-danger btn-sm" onclick="clearAllData()">&#x1F5D1; 全データ削除</button>
    </div>
    <div class="patient-filter">
      <label>患者フィルタ:</label>
      <select id="patient-select" onchange="applyFilter()">
        <option value="__all__">全患者</option>
      </select>
      <span id="record-count" style="font-size:12px;color:#888"></span>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('hit6-tab',this)">HIT-6 推移</button>
      <button class="tab" onclick="switchTab('mhd-tab',this)">MHD / MMD</button>
      <button class="tab" onclick="switchTab('scatter-tab',this)">HIT-6 &times; MIBS-4</button>
      <button class="tab" onclick="switchTab('mibs4-tab',this)">MIBS-4 推移</button>
    </div>
    <div id="hit6-tab" class="tab-panel active">
      <div class="chart-container"><canvas id="hit6Chart"></canvas></div>
    </div>
    <div id="mhd-tab" class="tab-panel">
      <div class="chart-container"><canvas id="mhdChart"></canvas></div>
    </div>
    <div id="scatter-tab" class="tab-panel">
      <div class="chart-container"><canvas id="scatterChart"></canvas></div>
    </div>
    <div id="mibs4-tab" class="tab-panel">
      <div class="chart-container"><canvas id="mibs4Chart"></canvas></div>
    </div>
    <div id="empty-charts" class="empty-state" style="display:none">
      <div class="icon">&#x1F4ED;</div>
      <div>データがありません。QRコードを読み取ってください。</div>
    </div>
  </div>

  <div class="card">
    <h2>&#x1F4CB; データ一覧 <button class="btn btn-sm btn-secondary" onclick="toggleTable()" id="toggle-table-btn">展開</button></h2>
    <div id="table-section" style="display:none">
      <div class="table-wrap">
        <table class="data-table" id="data-table">
          <thead>
            <tr>
              <th>日付</th><th>氏名</th><th>MHD</th><th>MMD</th>
              <th>HIT-6</th><th>MIBS-4</th><th>判定</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="data-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- QR Scanner Modal -->
<div class="modal hidden" id="scanner-modal">
  <div class="modal-card">
    <h3>&#x1F4F7; QRコード読み取り</h3>
    <div class="scan-methods">
      <!-- ファイルから読み取り（iOSでも安定） -->
      <div class="file-upload-area" id="file-upload-area" onclick="document.getElementById('qr-file-input').click()">
        <div class="icon">&#x1F4F1;</div>
        <div class="label">タップしてQRコード画像を選択<br><small>（カメラ撮影 or ライブラリ）</small></div>
        <input type="file" id="qr-file-input" accept="image/*" capture="environment" onchange="onFileSelected(event)">
      </div>
      <div class="or-divider">または</div>
      <!-- ライブカメラスキャン -->
      <button class="btn btn-primary" onclick="startLiveCamera()" id="live-camera-btn" style="width:100%;justify-content:center">&#x1F3A5; ライブカメラでスキャン</button>
      <div id="qr-reader"></div>
      <div class="scanner-status" id="scanner-status"></div>
    </div>
    <div style="margin-top:10px;text-align:center">
      <button class="btn btn-secondary" onclick="closeScanner()" style="width:100%">閉じる</button>
    </div>
  </div>
</div>

<!-- Manual Input Modal -->
<div class="modal hidden" id="manual-modal">
  <div class="modal-card">
    <h3>&#x1F4DD; QRテキスト手動入力</h3>
    <p style="font-size:12px;color:#888;margin-bottom:8px">QRコードの内容をペーストしてください</p>
    <div class="manual-input">
      <textarea id="manual-text" placeholder="頭痛チェックシート&#10;日付: 2025/1/24&#10;氏名: ...&#10;..."></textarea>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeManualInput()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitManualInput()">登録</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'headache_qr_data';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function parseQrText(text) {
  var d = {};
  var dateM = text.match(/\u65e5\u4ed8[\uff1a:]\s*(\d{2,4})\/?-?(\d{1,2})\/?-?(\d{1,2})/);
  if (dateM) {
    var y = parseInt(dateM[1]); if (y < 100) y += 2000;
    var m = parseInt(dateM[2]), day = parseInt(dateM[3]);
    d.date = y + '/' + String(m).padStart(2,'0') + '/' + String(day).padStart(2,'0');
    d.sortKey = y * 10000 + m * 100 + day;
  }
  var nameM = text.match(/\u6c0f\u540d[\uff1a:]\s*(.+)/);
  if (nameM) d.name = nameM[1].trim().replace(/^-$/, '');
  var docM = text.match(/\u62c5\u5f53\u533b[\uff1a:]\s*(.+)/);
  if (docM) d.doctor = docM[1].trim().replace(/^-$/, '');
  var mhdM = text.match(/\u982d\u75db\u304c\u3042\u3063\u305f\u65e5[\uff1a:]?\s*(?:\u7d04)?(\d+)\s*\u65e5/);
  if (mhdM) d.mhd = parseInt(mhdM[1]);
  var mmdM = text.match(/\u75db\u307f\u6b62\u3081(?:\u3092)?\u670d\u7528(?:\u3057\u305f)?\u65e5[\uff1a:]?\s*(?:\u7d04)?(\d+)\s*\u65e5/);
  if (mmdM) d.mmd = parseInt(mmdM[1]);
  var ncM = text.match(/\u30b9\u30c3\u30ad\u30ea\u305b\u305a[\uff1a:]?\s*(?:\u7d04)?(\d+)\s*\u65e5/);
  if (ncM) d.notClearDays = parseInt(ncM[1]);
  var clM = text.match(/\u30b9\u30c3\u30ad\u30ea[\uff1a:]?\s*(?:\u7d04)?(\d+)\s*\u65e5/);
  if (clM) d.clearDays = parseInt(clM[1]);
  var hit6M = text.match(/\u3010HIT-6\u3011\s*(\d+)\u70b9\s*(\S+)/);
  if (hit6M) { d.hit6 = parseInt(hit6M[1]); d.hit6Verdict = hit6M[2]; }
  else if (text.match(/\u3010HIT-6\u3011\s*\u672a\u5b8c/)) { d.hit6 = null; }
  var mibs4M = text.match(/\u3010MIBS-4\u3011\s*(\d+)\u70b9\s*(\S+)/);
  if (mibs4M) { d.mibs4 = parseInt(mibs4M[1]); d.mibs4Verdict = mibs4M[2]; }
  else if (text.match(/\u3010MIBS-4\u3011\s*\u672a\u5b8c/)) { d.mibs4 = null; }
  var hit6A = text.match(/\u3010HIT-6\u3011[^\n]*\n\u56de\u7b54[\uff1a:]\s*([0-9,\-]+)/);
  if (hit6A) d.hit6Answers = hit6A[1];
  var mibs4A = text.match(/\u3010MIBS-4\u3011[^\n]*\n\u56de\u7b54[\uff1a:]\s*([0-9,\-]+)/);
  if (mibs4A) d.mibs4Answers = mibs4A[1];
  var noteM = text.match(/\u3010\u5099\u8003\u3011\s*([\s\S]*)/);
  if (noteM) d.note = noteM[1].trim();
  d.id = Date.now() + '_' + Math.random().toString(36).slice(2,6);
  d.rawText = text;
  return d;
}

// ===== QR Scanner (iOS-safe) =====
var html5QrCode = null;
var scannerRunning = false;

function openScanner() {
  document.getElementById('scanner-modal').classList.remove('hidden');
  document.getElementById('scanner-status').textContent = '';
  document.getElementById('qr-reader').innerHTML = '';
  document.getElementById('live-camera-btn').style.display = '';
  document.getElementById('qr-file-input').value = '';
}

function startLiveCamera() {
  if (scannerRunning) return;
  var statusEl = document.getElementById('scanner-status');
  statusEl.textContent = '\u30ab\u30e1\u30e9\u3092\u8d77\u52d5\u4e2d...';
  document.getElementById('live-camera-btn').style.display = 'none';

  html5QrCode = new Html5Qrcode('qr-reader');

  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
    function onSuccess(decodedText) {
      stopLiveCamera(function() {
        closeScanner();
        addRecord(decodedText);
      });
    },
    function onError() {}
  ).then(function() {
    scannerRunning = true;
    statusEl.textContent = 'QR\u30b3\u30fc\u30c9\u3092\u304b\u3056\u3057\u3066\u304f\u3060\u3055\u3044';
  }).catch(function(err) {
    scannerRunning = false;
    statusEl.textContent = '\u30ab\u30e1\u30e9\u3092\u8d77\u52d5\u3067\u304d\u307e\u305b\u3093\u3067\u3057\u305f\u3002\u753b\u50cf\u9078\u629e\u3092\u304a\u4f7f\u3044\u304f\u3060\u3055\u3044\u3002';
    document.getElementById('live-camera-btn').style.display = '';
    document.getElementById('live-camera-btn').textContent = '\u2757 \u30ab\u30e1\u30e9\u8d77\u52d5\u5931\u6557 - \u518d\u8a66\u884c';
    console.error('Camera start error:', err);
  });
}

function stopLiveCamera(callback) {
  if (html5QrCode && scannerRunning) {
    scannerRunning = false;
    html5QrCode.stop().then(function() {
      html5QrCode.clear();
      html5QrCode = null;
      if (callback) callback();
    }).catch(function() {
      html5QrCode = null;
      scannerRunning = false;
      if (callback) callback();
    });
  } else {
    if (html5QrCode) {
      try { html5QrCode.clear(); } catch(e) {}
      html5QrCode = null;
    }
    scannerRunning = false;
    if (callback) callback();
  }
}

function closeScanner() {
  stopLiveCamera(function() {
    document.getElementById('scanner-modal').classList.add('hidden');
    document.getElementById('qr-reader').innerHTML = '';
  });
}

// ===== File-based QR reading (iOS-safe) =====
function onFileSelected(event) {
  var file = event.target.files[0];
  if (!file) return;
  var statusEl = document.getElementById('scanner-status');
  statusEl.textContent = '\u753b\u50cf\u3092\u89e3\u6790\u4e2d...';

  var reader = new Html5Qrcode('qr-reader-file-tmp');
  reader.scanFile(file, true)
    .then(function(decodedText) {
      statusEl.textContent = '';
      closeScanner();
      addRecord(decodedText);
    })
    .catch(function(err) {
      statusEl.textContent = 'QR\u30b3\u30fc\u30c9\u3092\u8aad\u307f\u53d6\u308c\u307e\u305b\u3093\u3067\u3057\u305f\u3002\u518d\u5ea6\u64ae\u5f71\u3057\u3066\u304f\u3060\u3055\u3044\u3002';
      console.error('File scan error:', err);
    });
  event.target.value = '';
}

// ===== Manual Input =====
function openManualInput() {
  document.getElementById('manual-text').value = '';
  document.getElementById('manual-modal').classList.remove('hidden');
}
function closeManualInput() {
  document.getElementById('manual-modal').classList.add('hidden');
}
function submitManualInput() {
  var text = document.getElementById('manual-text').value.trim();
  if (!text) { showToast('\u30c6\u30ad\u30b9\u30c8\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044', 'error'); return; }
  closeManualInput();
  addRecord(text);
}

// ===== Add Record =====
function addRecord(text) {
  if (text.indexOf('\u982d\u75db\u30c1\u30a7\u30c3\u30af\u30b7\u30fc\u30c8') < 0 && text.indexOf('HIT-6') < 0 && text.indexOf('MIBS-4') < 0) {
    showToast('\u982d\u75db\u30c1\u30a7\u30c3\u30af\u30b7\u30fc\u30c8\u306eQR\u3067\u306f\u3042\u308a\u307e\u305b\u3093', 'error');
    return;
  }
  var rec = parseQrText(text);
  if (!rec.date) { showToast('\u65e5\u4ed8\u3092\u8aad\u307f\u53d6\u308c\u307e\u305b\u3093\u3067\u3057\u305f', 'error'); return; }
  var data = loadData();
  var dup = data.find(function(r){ return r.date === rec.date && r.name === rec.name; });
  if (dup) {
    if (!confirm(rec.date + ' ' + (rec.name||'') + ' \u306e\u30c7\u30fc\u30bf\u306f\u65e2\u306b\u5b58\u5728\u3057\u307e\u3059\u3002\u4e0a\u66f8\u304d\u3057\u307e\u3059\u304b\uff1f')) return;
    var idx = data.indexOf(dup);
    data[idx] = rec;
  } else {
    data.push(rec);
  }
  data.sort(function(a,b){ return (a.sortKey||0) - (b.sortKey||0); });
  saveData(data);
  showToast(rec.date + ' \u306e\u30c7\u30fc\u30bf\u3092\u767b\u9332\u3057\u307e\u3057\u305f', 'success');
  refreshAll();
}

function deleteRecord(id) {
  if (!confirm('\u3053\u306e\u30ec\u30b3\u30fc\u30c9\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f')) return;
  var data = loadData().filter(function(r){ return r.id !== id; });
  saveData(data);
  refreshAll();
  showToast('\u524a\u9664\u3057\u307e\u3057\u305f', 'warn');
}

function clearAllData() {
  if (!confirm('\u5168\u30c7\u30fc\u30bf\u3092\u524a\u9664\u3057\u307e\u3059\u304b\uff1f\u3053\u306e\u64cd\u4f5c\u306f\u53d6\u308a\u6d88\u305b\u307e\u305b\u3093\u3002')) return;
  saveData([]);
  refreshAll();
  showToast('\u5168\u30c7\u30fc\u30bf\u3092\u524a\u9664\u3057\u307e\u3057\u305f', 'warn');
}

// ===== Filter =====
function getFilteredData() {
  var data = loadData();
  var sel = document.getElementById('patient-select').value;
  if (sel === '__all__') return data;
  return data.filter(function(r){ return (r.name || '\u4e0d\u660e') === sel; });
}

function applyFilter() { refreshAll(); }

function updatePatientSelect() {
  var data = loadData();
  var nameSet = {};
  data.forEach(function(r){ nameSet[r.name || '\u4e0d\u660e'] = true; });
  var names = Object.keys(nameSet);
  var sel = document.getElementById('patient-select');
  var cur = sel.value;
  sel.innerHTML = '<option value="__all__">\u5168\u60a3\u8005</option>';
  names.forEach(function(n) {
    var o = document.createElement('option');
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });
  if (names.indexOf(cur) >= 0 || cur === '__all__') sel.value = cur;
}

// ===== Toast =====
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(function(){ t.className = 'toast'; }, 2500);
}

// ===== Table =====
var tableOpen = false;
function toggleTable() {
  tableOpen = !tableOpen;
  document.getElementById('table-section').style.display = tableOpen ? 'block' : 'none';
  document.getElementById('toggle-table-btn').textContent = tableOpen ? '\u6298\u308a\u305f\u305f\u3080' : '\u5c55\u958b';
  if (tableOpen) renderTable();
}

function verdictBadge(score, type) {
  if (score == null) return '-';
  var cls, label;
  if (type === 'hit6') {
    if (score >= 60) { cls='severe'; label='\u91cd\u5ea6'; }
    else if (score >= 56) { cls='high'; label='\u304b\u306a\u308a'; }
    else if (score >= 50) { cls='moderate'; label='\u3042\u308b\u7a0b\u5ea6'; }
    else { cls='mild'; label='\u5f71\u97ff\u306a\u3057'; }
  } else {
    if (score >= 5) { cls='severe'; label='\u91cd\u5ea6'; }
    else if (score >= 3) { cls='high'; label='\u4e2d\u7b49\u5ea6'; }
    else if (score >= 1) { cls='moderate'; label='\u8efd\u5ea6'; }
    else { cls='mild'; label='\u652f\u969c\u306a\u3057'; }
  }
  return '<span class="badge badge-' + cls + '">' + label + '</span>';
}

function renderTable() {
  var data = getFilteredData();
  var tbody = document.getElementById('data-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:#aaa">\u30c7\u30fc\u30bf\u306a\u3057</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(function(r) {
    return '<tr>' +
      '<td>' + (r.date||'-') + '</td>' +
      '<td>' + (r.name||'-') + '</td>' +
      '<td>' + (r.mhd!=null?r.mhd:'-') + '</td>' +
      '<td>' + (r.mmd!=null?r.mmd:'-') + '</td>' +
      '<td>' + (r.hit6!=null?r.hit6+'\u70b9 '+verdictBadge(r.hit6,'hit6'):'-') + '</td>' +
      '<td>' + (r.mibs4!=null?r.mibs4+'\u70b9 '+verdictBadge(r.mibs4,'mibs4'):'-') + '</td>' +
      '<td style="font-size:11px">' + (r.hit6Verdict||'') + ' / ' + (r.mibs4Verdict||'') + '</td>' +
      '<td><button class="btn btn-danger btn-sm" onclick="deleteRecord(\'' + r.id + '\')">' + '\u524a\u9664' + '</button></td>' +
      '</tr>';
  }).join('');
}

// ===== Charts =====
var chartHit6, chartMhd, chartScatter, chartMibs4;

function shortDate(dateStr) {
  if (!dateStr) return '';
  var p = dateStr.split('/');
  return p[0].slice(2) + '/' + parseInt(p[1]) + '/' + parseInt(p[2]);
}

function renderCharts() {
  var data = getFilteredData();
  var cnt = document.getElementById('record-count');
  cnt.textContent = data.length + '\u4ef6';

  if (!data.length) {
    document.getElementById('empty-charts').style.display = 'block';
    ['hit6-tab','mhd-tab','scatter-tab','mibs4-tab'].forEach(function(id) {
      document.getElementById(id).style.display = 'none';
    });
    return;
  }
  document.getElementById('empty-charts').style.display = 'none';
  document.querySelectorAll('.tab-panel').forEach(function(p) {
    if (p.classList.contains('active')) p.style.display = 'block';
  });

  var labels = data.map(function(r){ return shortDate(r.date); });
  var hit6Data = data.map(function(r){ return r.hit6; });
  var mibs4Data = data.map(function(r){ return r.mibs4; });
  var mhdData = data.map(function(r){ return r.mhd; });
  var mmdData = data.map(function(r){ return r.mmd; });

  var pointColor = '#4a6f8e';
  var lineColor = '#4a6f8e';

  // --- HIT-6 Time Series ---
  if (chartHit6) chartHit6.destroy();
  var hit6Valid = hit6Data.filter(function(v){ return v != null; });
  var hit6Min = hit6Valid.length ? Math.max(36, Math.min.apply(null, hit6Valid) - 4) : 36;
  var hit6Max = hit6Valid.length ? Math.min(78, Math.max.apply(null, hit6Valid) + 4) : 78;
  chartHit6 = new Chart(document.getElementById('hit6Chart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'HIT-6',
        data: hit6Data,
        borderColor: lineColor,
        backgroundColor: pointColor,
        pointBackgroundColor: pointColor,
        pointRadius: 6,
        pointHoverRadius: 9,
        borderWidth: 2,
        tension: 0.15,
        fill: false,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'top',
          offset: 4,
          color: '#333',
          font: { size: 12, weight: 'bold' },
          formatter: function(v){ return v != null ? v : ''; }
        }
      },
      scales: {
        y: {
          min: hit6Min, max: hit6Max,
          title: { display: true, text: 'HIT-6', font: { size: 14 } },
          grid: { color: '#e8e8e8' }
        },
        x: {
          title: { display: true, text: '\u65e5\u4ed8', font: { size: 14 } },
          grid: { display: false },
          ticks: { maxRotation: 45, minRotation: 30 }
        }
      },
      layout: { padding: { top: 24 } }
    },
    plugins: [ChartDataLabels]
  });

  // --- MIBS-4 Time Series ---
  if (chartMibs4) chartMibs4.destroy();
  chartMibs4 = new Chart(document.getElementById('mibs4Chart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'MIBS-4',
        data: mibs4Data,
        borderColor: '#4f9d6b',
        backgroundColor: '#4f9d6b',
        pointBackgroundColor: '#4f9d6b',
        pointRadius: 6,
        pointHoverRadius: 9,
        borderWidth: 2,
        tension: 0.15,
        fill: false,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'top',
          offset: 4,
          color: '#333',
          font: { size: 12, weight: 'bold' },
          formatter: function(v){ return v != null ? v : ''; }
        }
      },
      scales: {
        y: {
          min: 0, max: 12,
          title: { display: true, text: 'MIBS-4', font: { size: 14 } },
          grid: { color: '#e8e8e8' }
        },
        x: {
          title: { display: true, text: '\u65e5\u4ed8', font: { size: 14 } },
          grid: { display: false },
          ticks: { maxRotation: 45, minRotation: 30 }
        }
      },
      layout: { padding: { top: 24 } }
    },
    plugins: [ChartDataLabels]
  });

  // --- MHD / MMD Bar Chart ---
  if (chartMhd) chartMhd.destroy();
  chartMhd = new Chart(document.getElementById('mhdChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'MHD (\u982d\u75db\u65e5\u6570)',
          data: mhdData,
          backgroundColor: 'rgba(232,132,42,0.7)',
          borderColor: '#e8842a',
          borderWidth: 1
        },
        {
          label: 'MMD (\u670d\u85ac\u65e5\u6570)',
          data: mmdData,
          backgroundColor: 'rgba(79,157,107,0.7)',
          borderColor: '#4f9d6b',
          borderWidth: 1
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top' },
        datalabels: {
          anchor: 'end',
          align: 'top',
          offset: 2,
          color: '#333',
          font: { size: 11, weight: 'bold' },
          formatter: function(v){ return v != null ? v : ''; }
        }
      },
      scales: {
        y: {
          min: 0, max: 28,
          title: { display: true, text: '\u65e5\u6570', font: { size: 14 } },
          grid: { color: '#e8e8e8' }
        },
        x: {
          title: { display: true, text: '\u65e5\u4ed8', font: { size: 14 } },
          grid: { display: false },
          ticks: { maxRotation: 45, minRotation: 30 }
        }
      },
      layout: { padding: { top: 24 } }
    },
    plugins: [ChartDataLabels]
  });

  // --- HIT-6 vs MIBS-4 Scatter ---
  if (chartScatter) chartScatter.destroy();
  var scatterData = data
    .filter(function(r){ return r.hit6 != null && r.mibs4 != null; })
    .map(function(r){ return { x: r.mibs4, y: r.hit6, date: shortDate(r.date) }; });

  chartScatter = new Chart(document.getElementById('scatterChart'), {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'HIT-6 \u00d7 MIBS-4',
        data: scatterData,
        backgroundColor: pointColor,
        pointRadius: 7,
        pointHoverRadius: 10
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        datalabels: {
          align: 'right',
          anchor: 'end',
          offset: 6,
          color: '#555',
          font: { size: 10 },
          formatter: function(v, ctx) {
            var pt = ctx.dataset.data[ctx.dataIndex];
            return pt.date + '\n' + pt.x + ';' + pt.y;
          }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var pt = ctx.raw;
              return pt.date + ' \u2014 MIBS-4: ' + pt.x + ', HIT-6: ' + pt.y;
            }
          }
        }
      },
      scales: {
        x: {
          min: 0, max: 12,
          title: { display: true, text: 'MIBS-4', font: { size: 14 } },
          grid: { color: '#e8e8e8' }
        },
        y: {
          min: 36, max: 78,
          title: { display: true, text: 'HIT-6', font: { size: 14 } },
          grid: { color: '#e8e8e8' }
        }
      },
      layout: { padding: { top: 20, right: 40 } }
    },
    plugins: [
      ChartDataLabels,
      {
        id: 'refLines',
        beforeDraw: function(chart) {
          var ctx = chart.ctx;
          var xAxis = chart.scales.x;
          var yAxis = chart.scales.y;
          ctx.save();
          ctx.strokeStyle = '#bbb';
          ctx.lineWidth = 1;
          ctx.setLineDash([6,4]);
          var y60 = yAxis.getPixelForValue(60);
          ctx.beginPath(); ctx.moveTo(xAxis.left, y60); ctx.lineTo(xAxis.right, y60); ctx.stroke();
          var x5 = xAxis.getPixelForValue(5);
          ctx.beginPath(); ctx.moveTo(x5, yAxis.top); ctx.lineTo(x5, yAxis.bottom); ctx.stroke();
          ctx.restore();
        }
      }
    ]
  });
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); p.style.display = 'none'; });
  btn.classList.add('active');
  var panel = document.getElementById(tabId);
  panel.classList.add('active');
  panel.style.display = 'block';
}

function exportCsv() {
  var data = getFilteredData();
  if (!data.length) { showToast('\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093', 'error'); return; }
  var header = '\u65e5\u4ed8,\u6c0f\u540d,\u62c5\u5f53\u533b,MHD,MMD,\u30b9\u30c3\u30ad\u30ea\u305b\u305a,\u30b9\u30c3\u30ad\u30ea,HIT-6,HIT-6\u5224\u5b9a,MIBS-4,MIBS-4\u5224\u5b9a,\u5099\u8003';
  var rows = data.map(function(r) {
    return [r.date, r.name||'', r.doctor||'', r.mhd!=null?r.mhd:'', r.mmd!=null?r.mmd:'',
      r.notClearDays!=null?r.notClearDays:'', r.clearDays!=null?r.clearDays:'',
      r.hit6!=null?r.hit6:'', r.hit6Verdict||'', r.mibs4!=null?r.mibs4:'', r.mibs4Verdict||'',
      (r.note||'').replace(/"/g,'""')]
      .map(function(v){ return '"'+v+'"'; }).join(',');
  });
  var csv = '\uFEFF' + header + '\n' + rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'headache_data_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV\u3092\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3057\u307e\u3057\u305f', 'success');
}

function refreshAll() {
  updatePatientSelect();
  renderCharts();
  if (tableOpen) renderTable();
}

// Hidden element for file-based QR scan
var tmpDiv = document.createElement('div');
tmpDiv.id = 'qr-reader-file-tmp';
tmpDiv.style.display = 'none';
document.body.appendChild(tmpDiv);

refreshAll();
</script>
